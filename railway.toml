[build]
builder = "NIXPACKS"
buildCommand = "cd xiyuan_frontend && npm ci && npm run build && cd ../xiyuan_backend && npm ci"

[deploy]
startCommand = "node xiyuan_backend/src/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
